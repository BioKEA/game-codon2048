<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06080d"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="helix" x1="40" y1="256" x2="472" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="256" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="3"/>

  <!-- Corner brackets -->
  <g stroke="#22d3ee" stroke-opacity="0.7" stroke-width="6" fill="none">
    <path d="M 56 86 V 56 H 86"/>
    <path d="M 426 56 H 456 V 86"/>
    <path d="M 56 426 V 456 H 86"/>
    <path d="M 426 456 H 456 V 426"/>
  </g>

  <!-- Double helix centerpiece -->
  <g transform="translate(0, 30)">
    <path d="M80 130 Q 180 380, 256 130 T 432 130"
          fill="none" stroke="url(#helix)" stroke-width="32" stroke-linecap="round"/>
    <path d="M80 380 Q 180 130, 256 380 T 432 380"
          fill="none" stroke="url(#helix)" stroke-width="32" stroke-linecap="round"/>
    <line x1="138" y1="180" x2="138" y2="330" stroke="#fbbf24" stroke-width="14" stroke-linecap="round"/>
    <line x1="256" y1="220" x2="256" y2="290" stroke="#fbbf24" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
    <line x1="372" y1="180" x2="372" y2="330" stroke="#fbbf24" stroke-width="14" stroke-linecap="round"/>
  </g>
</svg>
